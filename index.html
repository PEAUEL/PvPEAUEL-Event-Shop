<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Matrix Terminal Shop</title>
    <style>
        /* Basis-Setup und Fonts */
        @import url('https://googleapis.com');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
/* Container für das Overlay */
.custom-overlay {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #1e1e24;
    color: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    z-index: 1000;
    animation: slideIn 0.3s ease forwards;
    font-family: sans-serif;
    border-left: 5px solid #333;
}

/* Farb-Variationen je nach Code-Typ */
.custom-overlay.success { border-left-color: #2ecc71; }
.custom-overlay.info { border-left-color: #3498db; }

/* Inhalt-Styling */
.overlay-content h3 { margin: 0 0 5px 0; font-size: 1.1rem; }
.overlay-content p { margin: 0 0 15px 0; font-size: 0.9rem; color: #ccc; }
.overlay-content button {
    background: #e74c3c;
    border: none;
    color: white;
    padding: 5px 10px;
    border-radius: 5px;
    cursor: pointer;
}

/* Einblende-Animation */
@keyframes slideIn {
    from { transform: translateX(120%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
}

        body, html {
            width: 100%;
            height: 100%;
            background-color: #020208;
            font-family: 'Fira Code', monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* DER HOVER-LICHTEFFEKT (TASCHENLAMPE) */
        /* Die untere Ebene: Sichtbar nur dort, wo das Licht hinfällt */
        .matrix-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 255, 65, 0.1) 50%, rgba(0, 0, 0, 0) 50%),
                        linear-gradient(90deg, rgba(0, 255, 65, 0.05), rgba(0, 0, 0, 0));
            background-size: 100% 4px, 4px 100%;
            opacity: 0.15;
            z-index: 1;
        }

        /* Die obere Ebene: Dunkelblaues Overlay mit Loch (Mauszeiger) */
        .darkness-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #050b14; /* Das Haupt-Dunkelblau */
            z-index: 2;
            pointer-events: none; /* Lässt Maus-Events durch an den Body */
            transition: background 0.1s ease;
        }

        /* SHOP CONTAINER */
        .shop-container {
            position: relative;
            z-index: 3;
            width: 450px;
            padding: 40px;
            background: rgba(6, 15, 30, 0.75);
            backdrop-filter: blur(12px);
            border: 2px solid #00f3ff;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.2),
                        inset 0 0 15px rgba(0, 243, 255, 0.1);
            text-align: center;
            animation: float 6s ease-in-out infinite;
        }

        /* TITEL MIT NEON-GLOW-ANIMATION */
        h1 {
            font-family: 'Orbitron', sans-serif;
            color: #fff;
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00f3ff, 0 0 20px #00f3ff;
            animation: pulseGlow 2s infinite alternate;
        }

        p {
            color: #8da2bb;
            font-size: 0.85rem;
            margin-bottom: 30px;
        }

        /* INTERAKTIVE CODE EINGABE */
        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .code-input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(2, 2, 8, 0.8);
            border: 1px solid #ff0055;
            border-radius: 6px;
            color: #ff0055;
            font-family: 'Fira Code', monospace;
            font-size: 1.1rem;
            letter-spacing: 3px;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(255, 0, 85, 0.1);
        }

        .code-input:focus {
            color: #00f3ff;
            border-color: #00f3ff;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.5),
                        inset 0 0 10px rgba(0, 243, 255, 0.2);
        }

        /* NEON SUBMIT BUTTON */
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 2px solid #00f3ff;
            border-radius: 6px;
            color: #00f3ff;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        .submit-btn:hover {
            background: #00f3ff;
            color: #020208;
            box-shadow: 0 0 30px #00f3ff;
            text-shadow: none;
        }

        /* Glitch-Linie auf dem Button beim Hover */
        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: 0.5s;
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        /* ANIMATIONEN (CSS) */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        @keyframes pulseGlow {
            0% { text-shadow: 0 0 10px #00f3ff, 0 0 20px #00f3ff; }
            100% { text-shadow: 0 0 15px #00f3ff, 0 0 30px #00f3ff, 0 0 40px #ff0055; }
        }

        /* Deko-Elemente */
        .terminal-header {
            display: flex;
            justify-content: flex-start;
            gap: 6px;
            margin-bottom: 15px;
        }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .dot.r { background: #ff5f56; }
        .dot.y { background: #ffbd2e; }
        .dot.g { background: #27c93f; }

    </style>
</head>
<body>

    <!-- Versteckte Code-Matrix im Hintergrund -->
    <div class="matrix-bg"></div>

    <!-- Das dunkelblaue Overlay, das durchleuchtet wird -->
    <div class="darkness-overlay" id="overlay"></div>

    <!-- Der Terminal Shop -->
    <div class="shop-container">
        <div class="terminal-header">
            <div class="dot r"></div>
            <div class="dot y"></div>
            <div class="dot g"></div>
        </div>
        
        <h1>Black Market</h1>
        <p>// ENTER ACCESS CODE TO UNLOCK INVENTORY</p>
        
        <div class="input-group">
            <input type="text" class="code-input" placeholder="XXXX-XXXX-XXXX" maxlength="14" id="shopCode">
        </div>
        
        <button class="submit-btn" onclick="decryptShop()">INITIALIZE DECRYPTION</button>
    </div>

    <script>
        const overlay = document.getElementById('overlay');

        // JS fängt die Mausbewegung ab und baut den Taschenlampen-Effekt dynamically in CSS
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            
            // Erzeugt einen radialen Farbverlauf, der an der Maus transparent ist (man sieht die Matrix) 
            // und nach außen hin im tiefen Dunkelblau (#050b14) endet.
            overlay.style.background = `radial-gradient(circle 180px at ${x}px ${y}px, transparent 0%, rgba(5, 11, 20, 0.98) 100%)`;
        });

        // Kleines interaktives Gimmick bei Code-Eingabe
        function decryptShop() {
            const input = document.getElementById('shopCode').value;
            if(input.length > 0) {
                alert("ACCESS GRANTED. LOADING FORBIDDEN GEAR...");
            } else {
                alert("ERROR: INVALID CHECKSUM.");
            }
        }
    </script>
</body>
</html>
