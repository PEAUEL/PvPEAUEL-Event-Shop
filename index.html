<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Matrix Terminal Shop</title>
    <style>
        /* Basis-Setup und Fonts */
        @import url('https://googleapis.com');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Container für das Overlay */
        .custom-overlay {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #1e1e24;
            color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 1000;
            animation: slideIn 0.3s ease forwards;
            font-family: sans-serif;
            border-left: 5px solid #333;
        }

        /* Farb-Variationen je nach Code-Typ */
        .custom-overlay.success { border-left-color: #2ecc71; }
        .custom-overlay.info { border-left-color: #3498db; }

        /* Inhalt-Styling */
        .overlay-content h3 { margin: 0 0 5px 0; font-size: 1.1rem; }
        .overlay-content p { margin: 0 0 15px 0; font-size: 0.9rem; color: #ccc; }
        .overlay-content button {
            background: #e74c3c;
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        /* Einblende-Animation */
        @keyframes slideIn {
            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(120%); opacity: 0; }
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #020208;
            font-family: 'Fira Code', monospace;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px 80px;
        }

        /* DER HOVER-LICHTEFFEKT (TASCHENLAMPE) */
        /* Die untere Ebene: Sichtbar nur dort, wo das Licht hinfällt */
        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 255, 65, 0.1) 50%, rgba(0, 0, 0, 0) 50%),
                        linear-gradient(90deg, rgba(0, 255, 65, 0.05), rgba(0, 0, 0, 0));
            background-size: 100% 4px, 4px 100%;
            opacity: 0.15;
            z-index: 1;
        }

        /* Die obere Ebene: Dunkelblaues Overlay mit Loch (Mauszeiger) */
        .darkness-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #050b14;
            z-index: 2;
            pointer-events: none;
            transition: background 0.1s ease;
        }

        /* MAIN WRAPPER */
        .content-wrapper {
            position: relative;
            z-index: 3;
            max-width: 1200px;
            width: 100%;
        }

        /* LOGIN/CHECKIN CONTAINER */
        .login-container {
            position: relative;
            z-index: 3;
            width: 100%;
            max-width: 450px;
            padding: 40px;
            background: rgba(6, 15, 30, 0.75);
            backdrop-filter: blur(12px);
            border: 2px solid #2ecc71;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(46, 204, 113, 0.2),
                        inset 0 0 15px rgba(46, 204, 113, 0.1);
            text-align: center;
            animation: float 6s ease-in-out infinite;
            margin: 0 auto 40px;
        }

        .login-container h2 {
            font-family: 'Orbitron', sans-serif;
            color: #fff;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #2ecc71, 0 0 20px #2ecc71;
        }

        .login-status {
            font-size: 0.85rem;
            color: #8da2bb;
            margin-bottom: 20px;
            min-height: 40px;
        }

        .login-status.active {
            background: rgba(46, 204, 113, 0.1);
            border: 1px solid rgba(46, 204, 113, 0.3);
            border-radius: 6px;
            padding: 12px;
            color: #2ecc71;
            text-shadow: 0 0 10px rgba(46, 204, 113, 0.5);
        }

        .balance-display {
            display: flex;
            justify-content: space-around;
            gap: 15px;
            margin-top: 15px;
            display: none;
        }

        .balance-display.active {
            display: flex;
        }

        .balance-item {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(46, 204, 113, 0.3);
            border-radius: 6px;
            padding: 10px;
        }

        .balance-label {
            color: #8da2bb;
            font-size: 0.7rem;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .balance-value {
            color: #2ecc71;
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(46, 204, 113, 0.6);
        }

        /* SHOP CONTAINER */
        .shop-container {
            position: relative;
            z-index: 3;
            width: 100%;
            max-width: 450px;
            padding: 40px;
            background: rgba(6, 15, 30, 0.75);
            backdrop-filter: blur(12px);
            border: 2px solid #00f3ff;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.2),
                        inset 0 0 15px rgba(0, 243, 255, 0.1);
            text-align: center;
            animation: float 6s ease-in-out infinite;
            margin: 0 auto 40px;
        }

        /* TITEL MIT NEON-GLOW-ANIMATION */
        h1 {
            font-family: 'Orbitron', sans-serif;
            color: #fff;
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00f3ff, 0 0 20px #00f3ff;
            animation: pulseGlow 2s infinite alternate;
        }

        p {
            color: #8da2bb;
            font-size: 0.85rem;
            margin-bottom: 30px;
        }

        /* INTERAKTIVE CODE EINGABE */
        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .code-input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(2, 2, 8, 0.8);
            border: 1px solid #ff0055;
            border-radius: 6px;
            color: #ff0055;
            font-family: 'Fira Code', monospace;
            font-size: 1.1rem;
            letter-spacing: 3px;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(255, 0, 85, 0.1);
        }

        .code-input.login-input {
            border-color: #2ecc71;
            color: #2ecc71;
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.1);
        }

        .code-input.login-input:focus {
            border-color: #2ecc71;
            color: #2ecc71;
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.5),
                        inset 0 0 10px rgba(46, 204, 113, 0.2);
        }

        .code-input:focus {
            color: #00f3ff;
            border-color: #00f3ff;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.5),
                        inset 0 0 10px rgba(0, 243, 255, 0.2);
        }

        /* NEON SUBMIT BUTTON */
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 2px solid #00f3ff;
            border-radius: 6px;
            color: #00f3ff;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        .submit-btn.login-btn {
            border-color: #2ecc71;
            color: #2ecc71;
        }

        .submit-btn.login-btn:hover {
            background: #2ecc71;
            color: #020208;
            box-shadow: 0 0 30px #2ecc71;
        }

        .submit-btn:hover {
            background: #00f3ff;
            color: #020208;
            box-shadow: 0 0 30px #00f3ff;
            text-shadow: none;
        }

        /* Glitch-Linie auf dem Button beim Hover */
        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: 0.5s;
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        /* CODE INFO SECTION */
        .code-info-section {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid rgba(0, 243, 255, 0.3);
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 8px;
            display: none;
        }

        .code-info-section.active {
            display: block;
            animation: fadeInUp 0.4s ease;
        }

        .code-info-title {
            color: #00f3ff;
            font-size: 0.95rem;
            font-weight: bold;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .code-display {
            background: rgba(2, 2, 8, 0.8);
            border: 1px solid #ff0055;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 15px;
            text-align: center;
        }

        .code-display-label {
            color: #8da2bb;
            font-size: 0.75rem;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .code-display-text {
            color: #ff0055;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.6);
            word-break: break-all;
        }

        .code-copy-btn {
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 1px solid #ff0055;
            border-radius: 4px;
            color: #ff0055;
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 10px;
        }

        .code-copy-btn:hover {
            background: #ff0055;
            color: #020208;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.8);
        }

        .code-info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 0.8rem;
        }

        .code-info-item {
            background: rgba(0, 243, 255, 0.05);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 4px;
            padding: 10px;
        }

        .code-info-item-label {
            color: #8da2bb;
            font-size: 0.7rem;
            text-transform: uppercase;
            margin-bottom: 3px;
        }

        .code-info-item-value {
            color: #00f3ff;
            font-weight: bold;
            font-size: 0.85rem;
        }

        /* INVENTORY GRID */
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            margin-top: 20px;
        }

        /* PRODUCT CARD STYLING */
        .product-card {
            position: relative;
            background: rgba(6, 15, 30, 0.6);
            border: 2px solid #ff0055;
            border-radius: 8px;
            padding: 15px;
            transition: all 0.4s ease;
            backdrop-filter: blur(10px);
            overflow: hidden;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.2),
                        inset 0 0 10px rgba(255, 0, 85, 0.05);
            animation: fadeInUp 0.6s ease forwards;
        }

        .product-card:nth-child(1) { animation-delay: 0.1s; }
        .product-card:nth-child(2) { animation-delay: 0.2s; }
        .product-card:nth-child(3) { animation-delay: 0.3s; }
        .product-card:nth-child(4) { animation-delay: 0.4s; }
        .product-card:nth-child(5) { animation-delay: 0.5s; }
        .product-card:nth-child(6) { animation-delay: 0.6s; }

        .product-card:hover {
            border-color: #00f3ff;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.6),
                        inset 0 0 20px rgba(0, 243, 255, 0.1),
                        0 0 50px rgba(255, 0, 85, 0.3);
            transform: translateY(-5px);
        }

        /* PRODUCT IMAGE */
        .product-image {
            width: 100%;
            height: 180px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid #00f3ff;
            border-radius: 6px;
            margin-bottom: 15px;
            object-fit: cover;
            position: relative;
            overflow: hidden;
        }

        .product-image::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent 30%, rgba(0, 243, 255, 0.1) 50%, transparent 70%);
            animation: shimmer 3s infinite;
            pointer-events: none;
        }

        /* PRODUCT INFO */
        .product-info {
            text-align: left;
        }

        .product-name {
            color: #00f3ff;
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }

        .product-desc {
            color: #8da2bb;
            font-size: 0.8rem;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        /* PRICE SECTION */
        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 0, 85, 0.3);
        }

        .product-price {
            color: #ff0055;
            font-size: 1.3rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.8);
        }

        .product-price::before {
            content: '◆ ';
        }

        .buy-btn {
            background: transparent;
            border: 1px solid #ff0055;
            color: #ff0055;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            font-family: 'Fira Code', monospace;
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .buy-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: #ff0055;
            z-index: -1;
            transition: 0.3s;
        }

        .buy-btn:hover {
            color: #020208;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.8);
        }

        .buy-btn:hover::before {
            left: 0;
        }

        /* CART SIDEBAR */
        .cart-sidebar {
            position: fixed;
            right: 0;
            top: 0;
            width: 380px;
            height: 100vh;
            background: rgba(6, 15, 30, 0.95);
            backdrop-filter: blur(15px);
            border-left: 2px solid #00f3ff;
            box-shadow: -0 0 40px rgba(0, 243, 255, 0.3),
                        inset 20px 0 30px rgba(0, 243, 255, 0.05);
            display: flex;
            flex-direction: column;
            z-index: 999;
            transform: translateX(100%);
            transition: transform 0.4s ease;
            overflow-y: auto;
            padding: 30px 20px;
        }

        .cart-sidebar.active {
            transform: translateX(0);
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0, 243, 255, 0.3);
        }

        .cart-title {
            color: #00f3ff;
            font-size: 1.3rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }

        .cart-close {
            background: transparent;
            border: 1px solid #ff0055;
            color: #ff0055;
            width: 30px;
            height: 30px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .cart-close:hover {
            background: #ff0055;
            color: #020208;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.8);
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .cart-item {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 0, 85, 0.4);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            animation: slideInRight 0.3s ease;
        }

        .cart-item:hover {
            border-color: #ff0055;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.3);
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-name {
            color: #00f3ff;
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .cart-item-price {
            color: #ff0055;
            font-size: 0.8rem;
        }

        .cart-item-remove {
            background: transparent;
            border: 1px solid #ff0055;
            color: #ff0055;
            padding: 4px 8px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.3s ease;
            margin-left: 10px;
        }

        .cart-item-remove:hover {
            background: #ff0055;
            color: #020208;
        }

        .cart-empty {
            color: #8da2bb;
            text-align: center;
            padding: 40px 20px;
            font-size: 0.9rem;
        }

        .cart-footer {
            border-top: 1px solid rgba(0, 243, 255, 0.3);
            padding-top: 15px;
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            color: #00f3ff;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .cart-total-price {
            color: #ff0055;
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.8);
        }

        .checkout-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 2px solid #00f3ff;
            border-radius: 6px;
            color: #00f3ff;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.95rem;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .checkout-btn:hover {
            background: #00f3ff;
            color: #020208;
            box-shadow: 0 0 30px #00f3ff;
        }

        .checkout-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* CART BUTTON (Fixed at bottom) */
        .cart-button-fixed {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 900;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cart-btn {
            width: 60px;
            height: 60px;
            border-radius: 6px;
            background: transparent;
            border: 2px solid #00f3ff;
            color: #00f3ff;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
        }

        .cart-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: #00f3ff;
            z-index: -1;
            transition: 0.4s;
        }

        .cart-btn:hover {
            color: #020208;
            box-shadow: 0 0 40px #00f3ff;
        }

        .cart-btn:hover::before {
            left: 0;
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ff0055;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.8);
        }

        .cart-label {
            color: #00f3ff;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
            white-space: nowrap;
        }

        /* MODAL STYLES FROM CODE.JS */
        .modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 2, 8, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1998;
            animation: fadeIn 0.3s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        .code-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            background: rgba(6, 15, 30, 0.95);
            border: 2px solid #00f3ff;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.4),
                        inset 0 0 20px rgba(0, 243, 255, 0.1);
            z-index: 1999;
            display: flex;
            flex-direction: column;
            animation: slideInModal 0.3s ease forwards;
            overflow: hidden;
        }

        @keyframes slideInModal {
            from {
                opacity: 0;
                transform: translate(-50%, -45%);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
        }

        @keyframes slideOutModal {
            from {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
            to {
                opacity: 0;
                transform: translate(-50%, -55%);
            }
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            border-bottom: 1px solid #00f3ff;
            background: linear-gradient(135deg, rgba(0, 243, 255, 0.1), transparent);
        }

        .modal-dots {
            display: flex;
            gap: 6px;
        }

        .modal-title {
            flex: 1;
            text-align: center;
            color: #00f3ff;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 10px #00f3ff;
        }

        .modal-close {
            background: none;
            border: none;
            color: #ff0055;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .modal-close:hover {
            color: #00f3ff;
            transform: scale(1.2);
            text-shadow: 0 0 10px #00f3ff;
        }

        .modal-body {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .modal-body::-webkit-scrollbar {
            width: 6px;
        }

        .modal-body::-webkit-scrollbar-track {
            background: rgba(0, 243, 255, 0.1);
        }

        .modal-body::-webkit-scrollbar-thumb {
            background: #00f3ff;
            border-radius: 10px;
        }

        .modal-image {
            max-width: 100%;
            height: auto;
            max-height: 300px;
            border: 1px solid #00f3ff;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
        }

        .modal-text {
            color: #8da2bb;
            font-family: 'Fira Code', monospace;
            font-size: 0.95rem;
            line-height: 1.6;
            text-align: center;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .modal-footer {
            padding: 20px;
            border-top: 1px solid #00f3ff;
            display: flex;
            gap: 10px;
            background: linear-gradient(135deg, transparent, rgba(0, 243, 255, 0.1));
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: 1px solid #00f3ff;
            border-radius: 6px;
            color: #00f3ff;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-btn:hover {
            background: #00f3ff;
            color: #020208;
            box-shadow: 0 0 20px #00f3ff;
        }

        /* ANIMATIONEN (CSS) */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        @keyframes pulseGlow {
            0% { text-shadow: 0 0 10px #00f3ff, 0 0 20px #00f3ff; }
            100% { text-shadow: 0 0 15px #00f3ff, 0 0 30px #00f3ff, 0 0 40px #ff0055; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
    </style>
</head>
<body>
    <div class="matrix-bg"></div>
    <div class="darkness-overlay"></div>
    
    <div class="content-wrapper">
        <!-- LOGIN CONTAINER -->
        <div class="login-container">
            <h2>▓▒░ CHECK-IN ░▒▓</h2>
            <div class="login-status">Scan your code or enter manually</div>
            <div class="input-group">
                <input type="text" id="codeInput" class="code-input login-input" placeholder="XXXXXX" maxlength="6">
            </div>
            <button class="submit-btn login-btn" onclick="verifyCode()">VERIFY</button>
        </div>

        <!-- SHOP CONTAINER -->
        <div class="shop-container">
            <h1>⚡ EVENT SHOP ⚡</h1>
            <p>Select items and generate your unique code</p>
            <div class="inventory-grid" id="inventoryGrid"></div>
            <div class="code-info-section" id="codeInfoSection">
                <div class="code-info-title">Your Purchase Code</div>
                <div class="code-display">
                    <div class="code-display-label">Secure Code</div>
                    <div class="code-display-text" id="generatedCode">-</div>
                </div>
                <button class="code-copy-btn" onclick="copyCode()">Copy Code</button>
                <div class="code-info-grid">
                    <div class="code-info-item">
                        <div class="code-info-item-label">Total Items</div>
                        <div class="code-info-item-value" id="cartItemCount">0</div>
                    </div>
                    <div class="code-info-item">
                        <div class="code-info-item-label">Total Price</div>
                        <div class="code-info-item-value" id="cartTotalPrice">0</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- CART SIDEBAR -->
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <div class="cart-title">CART</div>
            <button class="cart-close" onclick="toggleCart()">✕</button>
        </div>
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>TOTAL:</span>
                <span class="cart-total-price" id="cartTotal">0</span>
            </div>
            <button class="checkout-btn" onclick="generateCode()">CHECKOUT</button>
        </div>
    </div>

    <!-- CART BUTTON (Fixed) -->
    <div class="cart-button-fixed">
        <button class="cart-btn" onclick="toggleCart()">🛒</button>
        <div class="cart-count" id="cartCount">0</div>
        <div class="cart-label">CART</div>
    </div>

    <script>
        // ==================== CODE CONFIGURATION ====================
        // Base code: 503428
        // Each position (0-5) corresponds to one item
        const BASE_CODE = [5, 0, 3, 4, 2, 8];
        
        // Product Database - 6 items, one for each position in code
        const products = [
            { id: 1, name: 'Item 1', desc: 'Standard Item', price: 10, codePosition: 0 },
            { id: 2, name: 'Item 2', desc: 'Premium Item', price: 15, codePosition: 1 },
            { id: 3, name: 'Item 3', desc: 'Deluxe Item', price: 20, codePosition: 2 },
            { id: 4, name: 'Item 4', desc: 'Ultra Item', price: 25, codePosition: 3 },
            { id: 5, name: 'Item 5', desc: 'Mega Item', price: 30, codePosition: 4 },
            { id: 6, name: 'Item 6', desc: 'Legendary Item', price: 50, codePosition: 5 }
        ];

        // Global State - track which items have been purchased
        let purchasedItems = new Set();
        let cart = [];

        // ==================== INITIALIZATION ====================
        function initializeShop() {
            renderProducts();
        }

        // ==================== PRODUCT RENDERING ====================
        function renderProducts() {
            const grid = document.getElementById('inventoryGrid');
            grid.innerHTML = products.map(product => `
                <div class="product-card">
                    <div class="product-image"></div>
                    <div class="product-info">
                        <div class="product-name">${product.name}</div>
                        <div class="product-desc">${product.desc}</div>
                        <div class="product-footer">
                            <div class="product-price">${product.price}</div>
                            <button class="buy-btn" onclick="addToCart(${product.id}, '${product.name}', ${product.price}, ${product.codePosition})">
                                ADD TO CART
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ==================== CART MANAGEMENT ====================
        function addToCart(productId, productName, productPrice, codePosition) {
            // Mark this position as purchased
            purchasedItems.add(codePosition);
            
            // Add to cart
            cart.push({
                id: productId,
                name: productName,
                price: productPrice,
                codePosition: codePosition
            });
            
            updateCartUI();
            showOverlay('Item Added', `${productName} added to cart!`, 'success');
        }

        function removeFromCart(index) {
            const item = cart[index];
            cart.splice(index, 1);
            
            // Check if this item is still in cart
            const stillInCart = cart.some(cartItem => cartItem.codePosition === item.codePosition);
            if (!stillInCart) {
                purchasedItems.delete(item.codePosition);
            }
            
            updateCartUI();
        }

        function updateCartUI() {
            const cartItemsDiv = document.getElementById('cartItems');
            const cartCountDiv = document.getElementById('cartCount');
            const cartTotalDiv = document.getElementById('cartTotal');
            
            if (cart.length === 0) {
                cartItemsDiv.innerHTML = '<div class="cart-empty">Cart is empty</div>';
                cartCountDiv.textContent = '0';
                cartTotalDiv.textContent = '0';
            } else {
                const total = cart.reduce((sum, item) => sum + item.price, 0);
                cartItemsDiv.innerHTML = cart.map((item, index) => `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-price">◆ ${item.price}</div>
                        </div>
                        <button class="cart-item-remove" onclick="removeFromCart(${index})">Remove</button>
                    </div>
                `).join('');
                cartCountDiv.textContent = cart.length;
                cartTotalDiv.textContent = total;
            }
        }

        function toggleCart() {
            document.getElementById('cartSidebar').classList.toggle('active');
        }

        // ==================== CODE GENERATION ====================
        function generateCode() {
            if (cart.length === 0) {
                showOverlay('Empty Cart', 'Please add items to your cart', 'info');
                return;
            }

            // Create code array from base
            const codeArray = [...BASE_CODE];
            
            // For each purchased item, increment that position by 1
            purchasedItems.forEach(position => {
                codeArray[position] = codeArray[position] + 1;
            });
            
            const generatedCode = codeArray.join('');

            // Display the generated code
            document.getElementById('generatedCode').textContent = generatedCode;
            document.getElementById('cartItemCount').textContent = cart.length;
            document.getElementById('cartTotalPrice').textContent = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('codeInfoSection').classList.add('active');

            // Log for debugging
            console.log('Generated Code:', generatedCode);
            console.log('Base Code:', BASE_CODE.join(''));
            console.log('Purchased Items:', Array.from(purchasedItems));
            console.log('Cart:', cart);

            toggleCart();
            showOverlay('Code Generated', `Your code is ready! ${generatedCode}`, 'success');
        }

        // ==================== CODE VERIFICATION ====================
        function verifyCode() {
            const inputCode = document.getElementById('codeInput').value.trim();
            
            if (!inputCode || inputCode.length !== 6) {
                showOverlay('Invalid Code', 'Code must be exactly 6 digits', 'info');
                return;
            }

            // Parse input code
            const inputArray = inputCode.split('').map(Number);
            
            // Check each position
            const purchasedPositions = new Set();
            let isValid = true;
            
            for (let i = 0; i < 6; i++) {
                const inputDigit = inputArray[i];
                const baseDigit = BASE_CODE[i];
                
                if (inputDigit === baseDigit) {
                    // Item NOT purchased at this position
                    continue;
                } else if (inputDigit === baseDigit + 1) {
                    // Item WAS purchased at this position
                    purchasedPositions.add(i);
                } else {
                    // Invalid digit - code has been tampered with
                    isValid = false;
                    break;
                }
            }

            if (!isValid) {
                showOverlay('Tampered Code', 'Code verification failed - code has been modified', 'info');
                document.getElementById('codeInput').value = '';
                return;
            }

            // Code is valid - show purchased items
            const purchasedProductNames = products
                .filter(p => purchasedPositions.has(p.codePosition))
                .map(p => p.name)
                .join(', ');

            showOverlay('Valid Code', `Code accepted! Purchased: ${purchasedProductNames}`, 'success');
            document.getElementById('codeInput').value = '';
            console.log('Code verified - Purchased positions:', Array.from(purchasedPositions));
        }

        // ==================== UTILITY FUNCTIONS ====================
        function copyCode() {
            const codeText = document.getElementById('generatedCode').textContent;
            if (codeText === '-') {
                showOverlay('No Code', 'Generate a code first', 'info');
                return;
            }
            navigator.clipboard.writeText(codeText).then(() => {
                showOverlay('Copied', 'Code copied to clipboard!', 'success');
            });
        }

        function showOverlay(title, message, type = 'info') {
            const overlay = document.createElement('div');
            overlay.className = `custom-overlay ${type}`;
            overlay.innerHTML = `
                <div class="overlay-content">
                    <h3>${title}</h3>
                    <p>${message}</p>
                    <button onclick="this.parentElement.parentElement.remove()">Close</button>
                </div>
            `;
            document.body.appendChild(overlay);
            setTimeout(() => overlay.remove(), 4000);
        }

        // Initialize on page load
        window.addEventListener('DOMContentLoaded', initializeShop);
    </script>
</body>
</html>
